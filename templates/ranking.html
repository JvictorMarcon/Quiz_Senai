<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Ranking Global</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
        .pos { font-weight: bold; color: #f39c12; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Melhores Pontuações</h1>
        
        {% if ranking %}
        <table>
            <thead>
                <tr>
                    <th>Pos.</th>
                    <th>Nome</th>
                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody>
                {% for player in ranking %}
                <tr>
                    <td class="pos">{{ loop.index }}º</td>
                    <td>{{ player.name }}</td>
                    <td>{{ player.score }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
            <p>Ninguém jogou ainda. Seja o primeiro!</p>
        {% endif %}

        <br>
        <a href="/"><button>Jogar Novamente</button></a>
   
    </div>
</body>
</html>
